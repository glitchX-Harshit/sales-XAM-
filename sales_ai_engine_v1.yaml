phase: "sales_ai_engine_v1"

goal:
  description: >
    Build a Sales Intelligence Engine that analyzes the last 5–10 messages of a live
    conversation and generates real-time sales coaching insights for the dashboard.
    The system must use a single LLM call to generate structured outputs.

context:
  system_role: "AI Sales Copilot"
  sales_methodology: "SPIN Selling"
  target_users:
    - freelancers
    - early-stage sales teams
  use_case: "Live sales call coaching"

trigger_conditions:
  - event: "prospect_message_received"
  - event: "objection_keyword_detected"

conversation_memory:
  description: >
    Maintain a sliding window of the most recent conversation messages
    for contextual analysis.
  storage:
    type: "in-memory buffer"
  message_format:
    speaker: "rep | prospect"
    text: "transcript text"
    timestamp: "ISO time"
  window_size:
    min_messages: 5
    max_messages: 10
  eviction_policy:
    type: "FIFO"
    rule: "remove oldest message when buffer exceeds max_messages"

analysis_engine:
  name: "sales_ai_engine"
  description: >
    Central intelligence component that evaluates the conversation context
    using a single LLM call and returns structured sales insights.

  input:
    context_messages:
      description: "last 5–10 conversation messages"
      format: "ordered list"

  model_behavior:
    role: "elite B2B sales coach"
    methodology: "SPIN selling"

  reasoning_tasks:
    - detect_spin_stage
    - detect_sales_objection
    - generate_response_suggestion
    - generate_sales_coaching_tip
    - generate_next_best_question

  output_schema:
    spin_stage:
      values:
        - situation
        - problem
        - implication
        - need_payoff
    objection_type:
      values:
        - pricing
        - timing
        - trust
        - authority
        - need
        - competitor
        - none
    confidence:
      type: "float"
      range: "0.0-1.0"
    suggested_response:
      type: "string"
      description: "recommended reply for the salesperson"
    coaching_tip:
      type: "string"
      description: "sales strategy guidance"
    next_best_question:
      type: "string"
      description: "question that moves the conversation forward"

optimization_rules:
  llm_calls:
    type: "single_call_per_analysis"
  analysis_frequency:
    trigger: "prospect_messages_only"
  keyword_filtering:
    enabled: true
    keywords:
      - price
      - budget
      - expensive
      - competitor
      - contract
      - timeline
      - decision
      - integrate

backend_pipeline:
  steps:
    - receive_transcript_from_deepgram
    - append_message_to_memory_buffer
    - evaluate_trigger_conditions
    - run_sales_ai_engine
    - parse_structured_output
    - send_analysis_to_frontend

websocket_events:
  event_name: "aiAnalysis"
  payload_fields:
    - spin_stage
    - objection_type
    - confidence
    - suggested_response
    - coaching_tip
    - next_best_question

dashboard_mapping:
  objection_radar:
    source: "objection_type"
  response_coach:
    source: "suggested_response"
  sales_tip_panel:
    source: "coaching_tip"
  next_question_panel:
    source: "next_best_question"
  conversation_stage_indicator:
    source: "spin_stage"

error_handling:
  llm_timeout:
    action: "skip_update_and_continue_stream"
  invalid_json:
    action: "retry_once_then_ignore"

future_extensions:
  sales_persona_selector:
    description: >
      Allow users to choose different sales methodologies before starting the call.
    options:
      - SPIN
      - MEDDIC
      - Challenger

  deal_health_scoring:
    description: >
      Analyze conversation signals to estimate deal momentum.

  crm_integration:
    description: >
      Push summaries and insights to CRM platforms.

success_criteria:
  - AI analysis appears on dashboard during live transcript
  - Objection radar activates when objection detected
  - Suggested responses appear within 1–2 seconds
  - Coaching tips update dynamically during conversation