phase: phase3_transcript_pipeline
goal: enable real-time Deepgram transcripts to flow through backend pipeline and appear in the dashboard

context:
  current_state:
    - microphone audio streaming works
    - websocket connection stable
    - backend receives audio chunks
    - deepgram connection established
  missing:
    - transcript events not yet visible in backend logs
    - transcripts not forwarded to frontend

tasks:

  - name: verify_deepgram_transcript_callback
    file: backend/services/deepgram_stream.py
    action: modify
    instruction: |
      Inside the transcript event handler, add a debug print to confirm transcripts arrive.

      Add:

      print("TRANSCRIPT:", transcript)

  - name: ensure_transcript_callback_invoked
    file: backend/services/deepgram_stream.py
    action: verify
    instruction: |
      When a transcript arrives, call the provided callback.

      Example:

      if transcript:
          print("TRANSCRIPT:", transcript)
          await self.transcript_callback("prospect", transcript)

  - name: send_transcript_to_websocket
    file: backend/services/websocket_service.py
    action: verify
    instruction: |
      When handle_new_transcript() runs, ensure it sends the transcript to the frontend.

      Must send:

      {
        "type": "transcriptUpdate",
        "speaker": speaker,
        "text": text
      }

  - name: ensure_frontend_listener
    file: frontend/src/audio/audioStreamClient.js
    action: verify
    instruction: |
      Ensure websocket onmessage handler processes transcript events.

      Example:

      if (data.type === 'transcriptUpdate') {
          onTranscriptRef.current(data)
      }

  - name: update_dashboard_state
    file: frontend/src/components/Dashboard.jsx
    action: verify
    instruction: |
      When onTranscript fires, append transcript to state.

      Example:

      onTranscript: (t) =>
          setTranscript(prev => [...prev, { speaker: "prospect", text: t.text }])

verification_steps:

  - step: restart_backend
    command: python main.py

  - step: open_dashboard
    instruction: run frontend dev server and open dashboard

  - step: start_call
    instruction: click "Join Audio"

  - step: speak_test_phrase
    phrase: "hello I wanted to ask about pricing"

expected_backend_logs:
  - "received audio chunk"
  - "TRANSCRIPT: hello"
  - "TRANSCRIPT: I wanted to ask about pricing"

expected_frontend_behavior:
  - transcript lines appear in Live Transcript panel
  - typing indicator disappears once transcript arrives

success_criteria:
  - Deepgram transcripts visible in backend logs
  - transcripts streamed to frontend
  - Live Transcript panel updates in real time

next_phase:
  name: phase4_objection_detection
  goal: trigger objection detection and AI suggestion generation when transcripts arrive