project:
name: ai-sales-call-copilot
phase: phase_3_audio_streaming
goal: replace dummy transcript pipeline with real-time microphone capture and Deepgram streaming speech-to-text

architecture:
pipeline:
- browser_microphone_capture
- websocket_audio_stream
- backend_audio_router
- deepgram_streaming_stt
- transcript_generation
- existing_ai_pipeline
- dashboard_update

stack:
frontend:
framework: react
tools:
- navigator.mediaDevices.getUserMedia
- Web Audio API
- websocket client
backend:
framework: fastapi
realtime: websockets
ai:
stt_provider: deepgram
llm: openai

environment_variables:
required:
- OPENAI_API_KEY
- DEEPGRAM_API_KEY

frontend_tasks:

microphone_capture_module:
file: src/audio/microphoneCapture.js
responsibilities:
- request microphone access using navigator.mediaDevices.getUserMedia
- create audio stream using Web Audio API
- convert microphone stream to audio chunks
- chunk size target: 1000ms

audio_chunk_encoder:
file: src/audio/audioEncoder.js
responsibilities:
- convert raw audio stream into base64 or PCM chunks
- ensure format compatible with Deepgram (16khz mono)

websocket_audio_sender:
file: src/audio/audioStreamClient.js
responsibilities:
- open websocket connection to /ws/audio
- send audio chunks every second
- message format:

```
    type: audio_chunk
    payload:
      audio_data: base64
      timestamp: number
```

dashboard_integration:
file: hooks/useRealtimeCopilot.js
responsibilities:
- remove simulateSpeech()
- replace with microphone capture start/stop
- send audio chunks over websocket
- listen for transcript_update events
- update live transcript panel

backend_tasks:

websocket_audio_endpoint:
file: backend/websocket_audio_server.py
endpoint: /ws/audio
responsibilities:
- accept websocket audio stream
- receive audio_chunk messages
- forward chunks to audio router

audio_chunk_router:
file: backend/services/audio_router.py
responsibilities:
- receive audio chunks
- forward chunks to Deepgram streaming service
- handle backpressure

deepgram_stream_service:
file: backend/services/deepgram_stream.py
responsibilities:
- open Deepgram streaming connection
- send audio chunks
- receive transcript results
- extract transcript text

```
expected_output:

  transcript_event:
    type: transcript_update
    payload:
      speaker: client
      text: string
```

transcript_pipeline_integration:
file: backend/services/transcript_manager.py
responsibilities:
- accept transcripts from Deepgram
- append transcript to conversation buffer
- trigger objection detection

integration_tasks:

connect_to_existing_pipeline:
description: reuse existing components from Phase 2

```
components:
  - transcript_manager
  - objection_engine
  - suggestion_engine

flow:

  deepgram_transcript
        ↓
  transcript_manager
        ↓
  objection_engine
        ↓
  suggestion_engine
        ↓
  websocket_response
```

websocket_events:

client_to_server:

```
audio_chunk:
  payload:
    audio_data: base64
    timestamp: number
```

server_to_client:

```
transcript_update:
  payload:
    speaker: string
    text: string

objection_detected:
  payload:
    objection_type: string
    confidence: number

ai_suggestion:
  payload:
    strategy: string
    response: string
```

dashboard_component_mapping:

voice_stream:
source: microphone audio amplitude

live_transcript:
source: transcript_update

objection_radar:
source: objection_detected

ai_response_coach:
source: ai_suggestion

performance_targets:

audio_chunk_interval: 1s
speech_to_text_latency: <1.5s
ai_response_latency: <1s
total_pipeline_latency: <3s

testing_mode:

enable_audio_debug_logs: true
show_audio_chunk_count: true

success_criteria:

* microphone permission granted
* audio chunks sent via websocket
* deepgram returns transcript
* transcript appears in dashboard
* objection detection triggers
* ai suggestion appears

future_phases:

phase_4_database_persistence
phase_5_deal_health_scoring
phase_6_mobile_call_support
