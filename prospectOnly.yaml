title: "Force Prospect-Only Transcript (Tab Audio Only + Clean UI)"

goal: >
  Ensure only system/tab audio is captured,
  treat all transcripts as 'prospect',
  remove any 'user' speaker display,
  stabilize transcript + AI pipeline.

---

frontend_changes:

  file: "useAudioStream.js"

  steps:

    - step: "ENSURE ONLY TAB AUDIO IS USED"
      description: >
        Do NOT use microphone anywhere.

      code_logic: |
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: true,
          audio: true
        });

        // remove video
        stream.getVideoTracks().forEach(t => t.stop());

    - step: "VALIDATE AUDIO TRACK"
      code_logic: |
        if (!stream.getAudioTracks().length) {
          alert("Please enable 'Share tab audio'");
          return;
        }

    - step: "SEND RAW AUDIO ONLY"
      code_logic: |
        const pcm16 = floatTo16BitPCM(audioData);
        ws.send(pcm16);

---

backend_changes:

  file: "websocket_service.py"

  steps:

    - step: "FORCE SPEAKER = PROSPECT"
      description: >
        Ignore any speaker passed from Deepgram or previous logic.

      code_logic: |
        async def handle_new_transcript(self, speaker, text, websocket):
            speaker = "prospect"

            # store transcript
            self.transcript_manager.add_message(speaker, text)

            await self.send_personal_message(json.dumps({
                "type": "transcriptUpdate",
                "speaker": "prospect",
                "text": text
            }), websocket)

    - step: "REMOVE ANY 'user' LOGIC"
      description: >
        Delete:
        - diarization
        - speaker mapping
        - role detection

---

deepgram_changes:

  file: "deepgram_stream.py"

  steps:

    - step: "REMOVE DIARIZATION"
      code_logic: |
        LiveOptions(
          model="nova-2-general",
          encoding="linear16",
          sample_rate=16000,
          channels=1,
          interim_results=True,
          punctuate=True
        )

    - step: "ALWAYS RETURN PROSPECT"
      code_logic: |
        await self.transcript_callback("prospect", transcript)

---

ui_changes:

  file: "Dashboard.jsx"

  steps:

    - step: "REMOVE LEFT/RIGHT CHAT SPLIT"
      description: >
        No user vs prospect layout.

    - step: "SHOW SINGLE STREAM (PROSPECT ONLY)"
      code_logic: |
        {transcripts.map((msg, i) => (
          <div key={i} className="chat-bubble prospect">
            {msg.text}
          </div>
        ))}

    - step: "REMOVE USER LABEL"
      description: >
        Do not display "you" anywhere.

---

ai_pipeline:

  file: "sales_ai_engine.py"

  steps:

    - step: "TRIGGER ONLY ON PROSPECT"
      code_logic: |
        if speaker != "prospect":
            return None

---

expected_result:

  - "Only Zoom/Meet audio is captured"
  - "No mic interference"
  - "All transcripts labeled as prospect"
  - "UI shows single clean conversation stream"
  - "No confusion between user/prospect"
  - "AI responds correctly to prospect only"

---

important_rules:

  - "DO NOT reintroduce mic"
  - "DO NOT use diarization"
  - "DO NOT add speaker detection again"
  - "KEEP pipeline simple"

---

testing:

  steps:
    - "Join call"
    - "Play or speak in Zoom tab"
    - "Check transcript → should appear"
    - "No 'you' messages should appear"
    - "AI should respond to every line"