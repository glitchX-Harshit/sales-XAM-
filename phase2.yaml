project:
name: ai-sales-call-copilot
phase: backend_pipeline_development
goal: build realtime transcript → objection detection → AI suggestion pipeline using dummy transcript input

stack:
backend:
language: python
framework: fastapi
realtime: websockets
ai:
provider: openai
database: none_for_now
frontend: existing_dashboard

folder_structure:

backend:
main.py
websocket_server.py

```
services:
  transcript_manager.py
  objection_detector.py
  suggestion_engine.py

models:
  message_models.py

utils:
  logger.py
```

development_stages:

stage_1_websocket_message_pipeline:

```
description: establish structured websocket message handling between frontend and backend

websocket_endpoint: /ws

expected_client_messages:

  transcript_message:
    type: transcript
    payload:
      text: string
      speaker: client|user

backend_behavior:

  when_message_received:
    - log message
    - send acknowledgement

server_response_example:

  {
    "type": "ack",
    "message": "transcript received"
  }
```

stage_2_transcript_buffer:

```
description: maintain recent conversation context

file: services/transcript_manager.py

requirements:

  maintain_message_buffer:
    max_messages: 20

  functions:

    add_message:
      input:
        speaker: string
        text: string

    get_context:
      returns: last_20_messages
```

stage_3_objection_detection:

```
description: detect sales objections from transcript messages

file: services/objection_detector.py

initial_logic:

  pricing_keywords:
    - price
    - pricing
    - expensive
    - budget

  complexity_keywords:
    - complex
    - complicated
    - hard to use

  integration_keywords:
    - integration
    - connect
    - crm

detection_output:

  objection_event:
    type: objection_detected
    payload:
      objection_type: pricing|complexity|integration
      confidence: float
```

stage_4_ai_response_generation:

```
description: generate AI sales response suggestions

file: services/suggestion_engine.py

ai_model: openai

prompt_template:

  Analyze the sales conversation and detected objection.

  Provide a short response suggestion to handle the objection.

  Keep the response concise and suitable for live conversation.

ai_output:

  suggestion_event:
    type: ai_suggestion
    payload:
      strategy: string
      response: string
```

stage_5_websocket_event_dispatch:

```
description: send AI results back to dashboard

event_types:

  transcript_update
  objection_detected
  ai_suggestion

example_server_event:

  {
    "type": "ai_suggestion",
    "strategy": "ROI framing",
    "response": "Most teams initially worry about cost until they see the ROI within the first few months."
  }
```

dashboard_component_mapping:

live_transcript_panel:
listens_for: transcript_update

objection_radar:
listens_for: objection_detected

ai_response_coach:
listens_for: ai_suggestion

testing_mode:

enable_dummy_input: true

test_messages:

```
- text: "your pricing seems high"
  speaker: client

- text: "we tried AI tools before and they were too complex"
  speaker: client
```

expected_pipeline:

client_transcript_message
↓
websocket_server
↓
transcript_manager
↓
objection_detector
↓
suggestion_engine
↓
websocket_response_to_dashboard

success_criteria:

transcript appears in dashboard
objection radar highlights detected objection
AI response suggestion appears in response coach panel

future_stages:

stage_audio_streaming
stage_speech_to_text
stage_conversation_scoring
stage_deal_health_metrics
