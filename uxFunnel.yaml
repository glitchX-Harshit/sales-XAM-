PROJECT: Klyro Updated Flow (Keep Existing → Add Auth Layer)

GOAL:
  Keep current working flow (Landing → Call Brief → Live Call)
  Add authentication + session + user tracking without breaking UX

---

ROUTING_STRUCTURE:

  "/": LandingPage
  "/auth": AuthPage
  "/dashboard": Dashboard
  "/call-brief": CallBriefing   # already exists
  "/live-call": LiveCall        # already exists
  "/summary": PostCallSummary

---

FLOW_LOGIC:

  LandingPage:
    CTA_Button:
      label: "Get Started"
      action:
        if user NOT authenticated:
          redirect: "/auth"
        else:
          redirect: "/call-brief"

---

  AuthPage:
    components:
      - email_input
      - password_input
      - login_button
      - signup_toggle

    logic:
      on_success:
        if no previous calls:
          redirect: "/call-brief"
        else:
          redirect: "/dashboard"

---

  Dashboard:
    purpose: "Home base for returning users"

    components:
      - header (profile + logout)
      - start_call_button
      - past_calls (optional placeholder)
      - stats (optional)

    actions:
      on_start_call:
        redirect: "/call-brief"

---

  CallBriefing:
    EXISTING: true

    add:
      - attach user_id
      - attach session_id

    action:
      on_submit:
        save_call_context (backend or state)
        redirect: "/live-call"

---

  LiveCall:
    EXISTING: true

    add:
      - attach user_id to websocket
      - attach call_context

    logic:
      on_mount:
        start_audio_stream
        connect_ai_pipeline

      on_end_call:
        save_call_log
        redirect: "/summary"

---

  PostCallSummary:
    NEW:

    components:
      - summary_text
      - objections
      - deal_score
      - feedback_buttons

    actions:
      on_continue:
        redirect: "/dashboard"

---

AUTH_SYSTEM:

  strategy: JWT_based

  store:
    - token (localStorage or cookies)
    - user_id

  middleware:
    protect_routes:
      - "/dashboard"
      - "/call-brief"
      - "/live-call"

---

BACKEND_CHANGES:

  add_user_model:
    fields:
      - id
      - email
      - password_hash
      - created_at

  add_call_logs:
    fields:
      - user_id
      - transcript
      - ai_suggestions
      - timestamp

---

STATE_MANAGEMENT:

  global_state:
    - user
    - is_authenticated
    - current_call_context

---

UX_RULES:

  - If user not logged in → always redirect to /auth
  - If logged in → skip auth completely
  - No dead screens
  - Keep 1 primary CTA per page
  - Auto redirect after login

---

MINIMUM VIABLE FLOW (FINAL):

  First Time User:
    Landing → Auth → Call Brief → Live Call → Summary

  Returning User:
    Landing → Call Brief (skip auth) OR Dashboard → Call

---

FUTURE (NOT NOW):

  - subscription limits (5 free calls)
  - stripe payment integration
  - call history UI
  - onboarding (optional later)