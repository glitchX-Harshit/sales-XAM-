task: implement_call_context_engine

goal:
  description: >
    Add a pre-call context system so the AI Sales Engine receives structured
    information about the client and product before the call starts.
    This improves reasoning quality and suggestion accuracy during live calls.

architecture:

  existing_pipeline:
    - microphone_audio
    - deepgram_stt
    - transcript_manager
    - sales_ai_engine
    - websocket
    - dashboard

  updated_pipeline:
    - call_briefing_input
    - call_context_engine
    - microphone_audio
    - deepgram_stt
    - transcript_manager
    - sales_ai_engine
    - suggestion_manager
    - websocket
    - dashboard


new_backend_components:

  call_context_engine:

    new_file: backend/services/call_context_engine.py

    purpose: >
      Maintain session-level context about the client and product that
      will be injected into every AI reasoning request.

    data_structure:

      CallContext:
        fields:
          - client_name
          - client_industry
          - client_role
          - product_name
          - call_goal
          - created_at

    methods:

      create_context:
        input:
          - client_name
          - client_industry
          - client_role
          - product_name
          - call_goal
        output:
          - context_id

      get_context:
        input:
          - context_id
        output:
          - full_call_context

      attach_context_to_ai:
        behavior: >
          Merge call context with transcript buffer before sending
          request to sales_ai_engine.


backend_api:

  new_routes:

    POST /call/start:

      description: >
        Start a new call session with pre-call briefing data.

      request_body:

        client_name: string
        client_industry: string
        client_role: string
        product_name: string
        call_goal: string

      response:

        context_id: string
        message: "Call session initialized"


    GET /call/context/{context_id}:

      description: >
        Retrieve context for the current call session.


service_updates:

  websocket_service:

    modify_file: backend/services/websocket_service.py

    changes:

      - require context_id when websocket connection starts
      - fetch context from call_context_engine
      - pass context together with transcript to sales_ai_engine


  transcript_manager:

    no_major_changes: true

    existing_behavior:
      - maintain last 8 conversation messages


sales_ai_engine:

  modify_file: backend/services/sales_ai_engine.py

  improvement:

    include_call_context: true

  request_payload_structure:

    example:

      call_context:
        client_name: "Sarah Chen"
        client_industry: "Marketing Agency"
        client_role: "Founder"
        product_name: "AI Sales Assistant"
        call_goal: "Close monthly SaaS subscription"

      conversation:
        - speaker: prospect
          text: "This pricing seems expensive"


  prompt_instruction:

    system_prompt: >
      You are an elite B2B sales strategist assisting a salesperson
      during a live call.

      You have access to the following call context:

      Client Name
      Industry
      Client Role
      Product being sold
      Call goal

      Use this context to generate more personalized persuasion strategies.


frontend_updates:

  new_component:

    file: frontend/components/CallBriefingForm.jsx

    fields:

      - Client Name
      - Client Industry
      - Client Role
      - Product Being Sold
      - Goal of the Call

    behavior:

      - user fills form before starting call
      - form submits to POST /call/start
      - store returned context_id
      - pass context_id when starting websocket connection


dashboard_changes:

  show_context_summary:

    location: top_bar

    display:

      Client
      Industry
      Product
      Goal

    example_display:

      Client: Sarah Chen
      Industry: Marketing Agency
      Product: AI Sales Assistant
      Goal: Close subscription


ai_reasoning_example:

  input:

    call_context:
      client_industry: marketing_agency
      client_role: founder
      product: ai_sales_assistant

    conversation:
      prospect: "Your pricing is expensive"

  output:

    objection_type: pricing

    persuasion_strategy: roi_reframing

    suggested_response: >
      Many marketing agencies initially feel the same.
      But most teams recover the cost after closing
      just one additional client.

    next_best_question: >
      If the tool helped your team close one extra client
      each month, would the pricing still feel expensive?


success_criteria:

  - user can enter call briefing before starting session
  - context is attached to every AI reasoning request
  - AI suggestions become more personalized
  - system latency remains under 2 seconds
  - existing real-time pipeline continues working