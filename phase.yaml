project:
name: ai-sales-call-copilot
description: Real-time AI assistant that listens to sales calls and suggests responses during live conversations
architecture: realtime-ai-web-app

stack:
frontend:
framework: react
build_tool: vite
styling: tailwind
realtime: websocket-client
backend:
language: python
framework: fastapi
realtime: websockets
ai:
speech_to_text: deepgram
llm: openai
database:
type: postgresql
deployment:
containerization: docker

services:

session_service:
description: Manages active call sessions
endpoints:
- POST /start_call
- POST /end_call
- GET /session/{id}
data_model:
session:
session_id: string
client_name: string
company: string
start_time: timestamp
status: active|ended

websocket_service:
description: Handles real-time audio streaming between browser and backend
endpoint: /ws/audio
message_types:
- audio_chunk
- transcript
- ai_suggestion
- objection_detected

audio_stream_processor:
description: Processes incoming audio chunks
responsibilities:
- receive audio chunks
- forward to speech-to-text engine
- maintain audio buffer

speech_to_text_service:
provider: deepgram
description: Converts streamed audio to text
output:
transcript_event:
speaker: client|user
text: string
timestamp: number

transcript_manager:
description: Maintains conversation history buffer
buffer_size: 20_messages
functions:
- add_message
- get_recent_context

objection_detection_service:
description: Detects objections and intent from conversation
input: transcript_buffer
model: openai
prompt_template: detect_sales_objection
output:
objection:
type: pricing|integration|complexity|timing|trust
confidence: float

response_suggestion_engine:
description: Generates suggested responses during calls
input:
- objection_type
- transcript_context
output:
suggestion:
strategy: string
response_text: string

deal_health_engine:
description: Calculates live call metrics
metrics:
engagement_score:
objection_resolution_rate:
decision_maker_probability:
conversation_momentum:

analytics_service:
description: Calculates historical performance metrics
metrics:
win_rate:
avg_deal_speed:
objections_handled:
avg_response_time:

database:

tables:

```
sessions:
  id: uuid
  client_name: string
  company: string
  start_time: timestamp
  end_time: timestamp
  outcome: string

transcripts:
  id: uuid
  session_id: uuid
  speaker: string
  text: string
  timestamp: timestamp

objections:
  id: uuid
  session_id: uuid
  objection_type: string
  confidence: float
  detected_at: timestamp

suggestions:
  id: uuid
  session_id: uuid
  suggestion_text: string
  created_at: timestamp
```

frontend_integration:

websocket_events:

```
audio_chunk:
  direction: client_to_server
  payload:
    audio_data: base64
    session_id: string

transcript_update:
  direction: server_to_client
  payload:
    speaker: string
    text: string

objection_update:
  direction: server_to_client
  payload:
    objection_type: string
    confidence: number

ai_suggestion:
  direction: server_to_client
  payload:
    strategy: string
    text: string
```

dashboard_components_mapping:

voice_stream:
source: microphone_audio_input

live_transcript:
source: transcript_update_event

objection_radar:
source: objection_detection_service

ai_response_coach:
source: response_suggestion_engine

deal_health_panel:
source: deal_health_engine

top_metrics_cards:
source: analytics_service

realtime_pipeline:

steps:
- capture_audio_from_browser
- stream_audio_via_websocket
- speech_to_text_transcription
- update_transcript_buffer
- run_objection_detection
- generate_response_suggestion
- push_updates_to_frontend

performance_targets:

audio_chunk_interval: 1_second
transcription_latency: <1.5_seconds
ai_analysis_latency: <1_second
total_response_delay: <3_seconds
