project:
name: ai-sales-call-copilot
phase: phase_3_1_websocket_stability
goal: fix websocket race condition where audio chunks are sent before the websocket connection is open

problem_summary:
description: |
The frontend begins microphone capture and sends audio chunks before the
WebSocket connection reaches OPEN state. As a result, audio frames are dropped
silently and the backend never receives them.

symptoms:
- console shows "audio chunk sent"
- backend terminal shows no websocket activity
- dashboard transcript panel remains "Waiting for dialogue"

required_fix:
strategy: |
Ensure the microphone stream does not start until the websocket connection
is fully established.

frontend_changes:

modify_file:
path: frontend/src/audio/audioStreamClient.js

change_1_convert_websocket_connection_to_promise:
description: |
connectWebSocket must return a Promise and resolve only when the
websocket onopen event fires.

```
implementation_example:

  const connectWebSocket = useCallback(() => {
      if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
          return Promise.resolve();
      }

      return new Promise((resolve, reject) => {

          wsRef.current = new WebSocket(wsUrl);

          wsRef.current.onopen = () => {
              console.log("✅ Audio WebSocket Connected");
              resolve();
          };

          wsRef.current.onerror = (err) => {
              console.error("WebSocket error", err);
              reject(err);
          };

          wsRef.current.onmessage = (event) => {
              const data = JSON.parse(event.data);

              if (data.type === "transcriptUpdate" && onTranscriptRef.current) {
                  onTranscriptRef.current(data);
              }

              if (data.type === "objectionDetect" && onObjectionRef.current) {
                  onObjectionRef.current(data.objection);
              }

              if (data.type === "aiSuggestion" && onSuggestionRef.current) {
                  onSuggestionRef.current(data.suggestion);
              }
          };

          wsRef.current.onclose = () => {
              console.log("Audio WebSocket Disconnected");
          };

      });
```

change_2_wait_for_websocket_before_audio_capture:
description: |
startRecording must wait for websocket connection before requesting microphone
and starting the ScriptProcessor.

```
implementation_example:

  const startRecording = useCallback(async (callbacks = {}) => {

      onTranscriptRef.current = callbacks.onTranscript;
      onObjectionRef.current = callbacks.onObjection;
      onSuggestionRef.current = callbacks.onSuggestion;

      try {

          // WAIT for websocket to be open
          await connectWebSocket();

          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

          mediaStreamRef.current = stream;
```

change_3_add_debug_logging_for_audio_pipeline:
description: |
Add debug logs to confirm that audio frames are captured and transmitted.

```
logs_to_add:

  console.log("🎤 audio frame captured");
  console.log("📤 audio chunk sent:", pcm16.byteLength);
```

backend_verification:

required_logs:

```
websocket_connection_log:
  example:
    print("🔌 WebSocket connection attempt")
    print("✅ WebSocket connected")

audio_chunk_log:
  example:
    data = await websocket.receive_bytes()
    print("📥 received audio chunk:", len(data))
```

expected_runtime_behavior:

browser_console:
- "Audio WebSocket Connected"
- "🎤 audio frame captured"
- "📤 audio chunk sent"

backend_terminal:
- "WebSocket connected"
- "received audio chunk: 8192"

deepgram_response:
- transcript text returned
- transcriptUpdate websocket event emitted

success_criteria:

* websocket connection established before audio streaming begins
* backend receives audio chunks continuously
* deepgram produces transcript
* transcript panel updates in dashboard

next_phase_after_success:
phase_3_2_deepgram_latency_optimization
phase_4_database_persistence

notes:

* ScriptProcessorNode deprecation warning is acceptable for now
* Future improvement will migrate to AudioWorkletNode for lower latency
